name: Databricks Dev

on:
  push:
    branches:
      - dev

jobs:
  databricks-dev:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: |
          python -m pip install --upgrade pip
          pip install "databricks-cli>=0.205.0"

      - name: Validate Databricks bundle (dev)
        run: databricks bundle validate --target dev

      - name: Deploy Databricks bundle to dev
        if: github.event_name == 'push'
        run: databricks bundle deploy --target dev

      - name: Run medallion_pipeline job in dev (smoke test)
        if: github.event_name == 'push'
        run: databricks bundle run medallion_pipeline --target dev

