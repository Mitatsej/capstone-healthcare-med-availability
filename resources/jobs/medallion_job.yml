resources:
  jobs:
    medallion_pipeline:
      name: medallion_pipeline

      max_concurrent_runs: 1
      timeout_seconds: 0

      tags:
        project: capstone-healthcare-med-availability
        architecture: medallion
        owner: platform-engineering
        environment: shared-workspace

      tasks:
        - task_key: bronze_ingest
          description: "Bronze ingestion for all raw healthcare datasets"
          notebook_task:
            notebook_path: ../../src/notebooks/00_bronze/00_bronze_ingest_workflow.py
            source: WORKSPACE
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 300000

        - task_key: silver_diseases
          description: "Silver transformation for diseases dataset"
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: ../../src/notebooks/01_silver/diseases.ipynb
            source: WORKSPACE
          timeout_seconds: 2400
          max_retries: 1
          min_retry_interval_millis: 180000

        - task_key: silver_geography
          description: "Silver transformation for geography dataset"
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: ../../src/notebooks/01_silver/geography.ipynb
            source: WORKSPACE
          timeout_seconds: 2400
          max_retries: 1
          min_retry_interval_millis: 180000

        - task_key: silver_insurance
          description: "Silver transformation for insurance dataset"
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: ../../src/notebooks/01_silver/insurance.ipynb
            source: WORKSPACE
          timeout_seconds: 2400
          max_retries: 1
          min_retry_interval_millis: 180000

        - task_key: silver_inventory
          description: "Silver transformation for inventory dataset"
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: ../../src/notebooks/01_silver/inventory.ipynb
            source: WORKSPACE
          timeout_seconds: 2400
          max_retries: 1
          min_retry_interval_millis: 180000

        - task_key: silver_medication
          description: "Silver transformation for medication dataset"
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: ../../src/notebooks/01_silver/medication.ipynb
            source: WORKSPACE
          timeout_seconds: 2400
          max_retries: 1
          min_retry_interval_millis: 180000

        - task_key: silver_pharmacies
          description: "Silver transformation for pharmacies dataset"
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: ../../src/notebooks/01_silver/pharmacies.ipynb
            source: WORKSPACE
          timeout_seconds: 2400
          max_retries: 1
          min_retry_interval_millis: 180000

        - task_key: silver_data_quality
          description: "Run data quality checks after all silver transformations finish"
          depends_on:
            - task_key: silver_diseases
            - task_key: silver_geography
            - task_key: silver_insurance
            - task_key: silver_inventory
            - task_key: silver_medication
            - task_key: silver_pharmacies
          notebook_task:
            notebook_path: ../../src/notebooks/15_silver_data_quality.ipynb
            source: WORKSPACE
          timeout_seconds: 1800
          max_retries: 1
          min_retry_interval_millis: 180000

        - task_key: gold_publish
          description: "Publish gold tables and business-ready outputs"
          depends_on:
            - task_key: silver_data_quality
          notebook_task:
            notebook_path: ../../src/notebooks/02_gold/disease_medication_pharmacy_gold.ipynb
            source: WORKSPACE
          timeout_seconds: 2400
          max_retries: 1
          min_retry_interval_millis: 180000

        - task_key: smoke_test
          description: "Final smoke test for pipeline validation"
          depends_on:
            - task_key: gold_publish
          notebook_task:
            notebook_path: ../../src/notebooks/99_pipeline_smoke_test.ipynb
            source: WORKSPACE
          timeout_seconds: 1200
          max_retries: 0